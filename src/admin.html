<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NyXia IA — Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg1: #0F1C3F; --bg2: #1A2554; --bg3: #2A3A6E;
      --p: #7B5CFF; --p2: #5A6CFF; --p3: #4FA3FF;
      --t: #FFFFFF; --t2: #D6D9F0; --t3: #8891B8;
      --green: #00E676; --red: #FF4B6E; --orange: #FF9F43;
      --r: 14px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { background: var(--bg1); color: var(--t2); font-family: 'Outfit', sans-serif; min-height: 100vh; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 45% at 15% 5%, rgba(123,92,255,0.12) 0%, transparent 65%),
        radial-gradient(ellipse 50% 35% at 85% 85%, rgba(79,163,255,0.07) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ── LOGIN PAGE ── */
    #login-page {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg1);
    }
    .login-card {
      background: rgba(26,37,84,0.6);
      border: 1px solid rgba(123,92,255,0.2);
      border-radius: 24px; padding: 40px 36px;
      backdrop-filter: blur(20px); width: 100%; max-width: 400px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
      animation: cardIn .4s ease;
    }
    @keyframes cardIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }

    .login-header { text-align: center; margin-bottom: 32px; }
    .login-avatar {
      width: 72px; height: 72px; border-radius: 50%; object-fit: cover;
      border: 2px solid rgba(123,92,255,0.5);
      box-shadow: 0 0 40px rgba(123,92,255,0.4);
      margin: 0 auto 14px; display: block;
    }
    .login-title {
      font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, var(--p3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 4px;
    }
    .login-sub { color: var(--t3); font-size: 12px; }

    .form-group { margin-bottom: 16px; }
    .form-label {
      font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 600;
      color: var(--t3); text-transform: uppercase; letter-spacing: .8px;
      display: block; margin-bottom: 7px;
    }
    .form-input {
      width: 100%; background: rgba(15,28,63,0.7);
      border: 1px solid rgba(123,92,255,0.2); border-radius: 10px;
      color: var(--t); font-family: 'Outfit', sans-serif; font-size: 15px;
      padding: 12px 14px; outline: none; transition: border-color .2s;
    }
    .form-input:focus { border-color: rgba(123,92,255,0.55); }
    .form-input::placeholder { color: var(--t3); }

    .btn-primary {
      width: 100%; padding: 13px; border-radius: 50px; border: none;
      background: linear-gradient(135deg, var(--p), var(--p2)); color: #fff;
      font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; box-shadow: 0 0 24px rgba(123,92,255,0.4);
      transition: all .25s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 0 40px rgba(123,92,255,0.65); }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; }
    .btn-sm {
      padding: 6px 14px; border-radius: 50px; border: none;
      font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .btn-danger  { background: rgba(255,75,110,0.15); border: 1px solid rgba(255,75,110,0.3); color: #ff8fab; }
    .btn-danger:hover  { background: rgba(255,75,110,0.25); }
    .btn-warning { background: rgba(255,159,67,0.15); border: 1px solid rgba(255,159,67,0.3); color: var(--orange); }
    .btn-warning:hover { background: rgba(255,159,67,0.25); }
    .btn-success { background: rgba(0,230,118,0.12); border: 1px solid rgba(0,230,118,0.3); color: var(--green); }
    .btn-success:hover { background: rgba(0,230,118,0.2); }

    .msg { padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-top: 14px; display: none; }
    .msg.error   { background: rgba(255,75,110,0.1); border: 1px solid rgba(255,75,110,0.3); color: #ff8fab; }
    .msg.success { background: rgba(0,230,118,0.1); border: 1px solid rgba(0,230,118,0.3); color: var(--green); }

    /* ── DASHBOARD ── */
    #dashboard { display: none; position: relative; z-index: 1; }

    nav {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 60px;
      background: rgba(15,28,63,0.92); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(123,92,255,0.1);
    }
    .nav-brand {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, var(--p3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .nav-brand img { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 1.5px solid rgba(123,92,255,0.4); }
    .nav-badge {
      background: rgba(255,159,67,0.2); border: 1px solid rgba(255,159,67,0.4);
      color: var(--orange); font-size: 11px; padding: 2px 10px; border-radius: 50px;
      font-family: 'Space Grotesk', sans-serif; font-weight: 600;
    }
    .btn-logout {
      padding: 7px 18px; border-radius: 50px;
      border: 1px solid rgba(255,75,110,0.3); background: rgba(255,75,110,0.08);
      color: #ff8fab; font-family: 'Outfit', sans-serif; font-size: 13px;
      cursor: pointer; transition: all .2s;
    }
    .btn-logout:hover { background: rgba(255,75,110,0.15); }

    main { max-width: 960px; margin: 0 auto; padding: 36px 24px 80px; }

    /* ── STATS ── */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat-card {
      background: rgba(26,37,84,0.45); border: 1px solid rgba(123,92,255,0.12);
      border-radius: var(--r); padding: 20px 24px; backdrop-filter: blur(10px);
    }
    .stat-label { font-size: 12px; color: var(--t3); font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 800; font-family: 'Space Grotesk', sans-serif; }
    .stat-value.total  { color: var(--p3); }
    .stat-value.active { color: var(--green); }
    .stat-value.disabled-count { color: var(--orange); }

    /* ── CREATE FORM ── */
    .section-title {
      font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 700;
      color: var(--t2); margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    }
    .create-card {
      background: rgba(26,37,84,0.45); border: 1px solid rgba(123,92,255,0.14);
      border-radius: 18px; padding: 24px; backdrop-filter: blur(10px); margin-bottom: 28px;
    }
    .create-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .create-row .form-group { flex: 1; min-width: 200px; margin: 0; }
    .create-row .form-input { border-radius: 10px; }

    /* ── USER LIST ── */
    .users-card {
      background: rgba(26,37,84,0.45); border: 1px solid rgba(123,92,255,0.14);
      border-radius: 18px; overflow: hidden; backdrop-filter: blur(10px);
    }
    .users-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid rgba(123,92,255,0.1);
      background: rgba(15,28,63,0.3);
    }
    .btn-refresh {
      padding: 6px 14px; border-radius: 50px;
      border: 1px solid rgba(123,92,255,0.25); background: rgba(123,92,255,0.08);
      color: var(--t3); font-family: 'Outfit', sans-serif; font-size: 12px;
      cursor: pointer; transition: all .2s;
    }
    .btn-refresh:hover { border-color: var(--p); color: var(--t2); }

    .search-input {
      background: rgba(15,28,63,0.6); border: 1px solid rgba(123,92,255,0.15);
      border-radius: 50px; color: var(--t2); font-family: 'Outfit', sans-serif;
      font-size: 13px; padding: 7px 16px; outline: none; width: 200px;
      transition: border-color .2s;
    }
    .search-input:focus { border-color: rgba(123,92,255,0.4); }
    .search-input::placeholder { color: var(--t3); }

    .user-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid rgba(123,92,255,0.06);
      transition: background .15s; gap: 12px;
    }
    .user-row:last-child { border-bottom: none; }
    .user-row:hover { background: rgba(123,92,255,0.04); }
    .user-row.disabled-row { opacity: .6; }

    .user-email { font-size: 14px; color: var(--t2); flex: 1; word-break: break-all; }
    .user-status {
      font-size: 11px; padding: 3px 10px; border-radius: 50px;
      font-family: 'Space Grotesk', sans-serif; font-weight: 600; white-space: nowrap;
    }
    .status-active   { background: rgba(0,230,118,0.1); border: 1px solid rgba(0,230,118,0.25); color: var(--green); }
    .status-disabled { background: rgba(255,159,67,0.1); border: 1px solid rgba(255,159,67,0.25); color: var(--orange); }

    .user-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .empty-users { text-align: center; padding: 48px; color: var(--t3); font-size: 14px; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: rgba(26,37,84,0.95); border: 1px solid rgba(123,92,255,0.3);
      color: var(--t2); font-family: 'Outfit', sans-serif; font-size: 14px;
      padding: 12px 24px; border-radius: 50px; z-index: 9999;
      backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      display: none; animation: fadeUp .3s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateX(-50%) translateY(8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

    .spinner { width:15px; height:15px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; display:none; }
    @keyframes spin { to { transform:rotate(360deg); } }

    @media (max-width:640px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .create-row { flex-direction: column; }
      .create-row .form-group { width: 100%; }
      nav { padding: 0 16px; }
    }
  </style>
</head>
<body>

  <!-- ══ LOGIN PAGE ══ -->
  <div id="login-page">
    <div class="login-card">
      <div class="login-header">
        <img src="/NyXia.png" alt="NyXia" class="login-avatar">
        <div class="login-title">NyXia Admin</div>
        <div class="login-sub">Espace superadmin — accès restreint</div>
      </div>
      <div class="form-group">
        <label class="form-label">Email admin</label>
        <input class="form-input" type="email" id="a-email" placeholder="admin@nyxia.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-input" type="password" id="a-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="btn-admin-login" onclick="adminLogin()">
        <div class="spinner" id="login-spinner"></div>
        <span id="login-text">Accéder au dashboard</span>
      </button>
      <div class="msg" id="login-msg"></div>
    </div>
  </div>

  <!-- ══ DASHBOARD ══ -->
  <div id="dashboard">

    <nav>
      <div class="nav-brand">
        <img src="/NyXia.png" alt="NyXia">
        NyXia Admin
        <span class="nav-badge">⚡ SUPERADMIN</span>
      </div>
      <button class="btn-logout" onclick="adminLogout()">Déconnexion</button>
    </nav>

    <main>

      <!-- STATS -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Total comptes</div>
          <div class="stat-value total" id="stat-total">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Actifs</div>
          <div class="stat-value active" id="stat-active">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Désactivés</div>
          <div class="stat-value disabled-count" id="stat-disabled">—</div>
        </div>
      </div>

      <!-- CREATE -->
      <div class="section-title">➕ Créer un compte client</div>
      <div class="create-card">
        <div class="create-row">
          <div class="form-group">
            <label class="form-label">Email du client</label>
            <input class="form-input" type="email" id="new-email" placeholder="client@email.com">
          </div>
          <div class="form-group">
            <label class="form-label">Mot de passe</label>
            <input class="form-input" type="text" id="new-password" placeholder="Mot de passe temporaire">
          </div>
          <button class="btn-primary" id="btn-create" onclick="createUser()" style="width:auto;padding:12px 28px;margin-bottom:0;flex-shrink:0">
            <div class="spinner" id="create-spinner"></div>
            <span id="create-text">Créer</span>
          </button>
        </div>
        <div class="msg" id="create-msg"></div>
      </div>


      <!-- CHANGER MOT DE PASSE -->
      <div class="section-title" style="margin-top:8px">🔐 Mon mot de passe admin</div>
      <div class="create-card" style="margin-bottom:28px">
        <div class="create-row">
          <div class="form-group">
            <label class="form-label">Nouveau mot de passe</label>
            <input class="form-input" type="password" id="new-pw" placeholder="Nouveau mot de passe (6 car. min)">
          </div>
          <div class="form-group">
            <label class="form-label">Confirmer</label>
            <input class="form-input" type="password" id="confirm-pw" placeholder="Confirme le mot de passe">
          </div>
          <button class="btn-primary" onclick="changePassword()" style="width:auto;padding:12px 24px;margin-bottom:0;flex-shrink:0;background:linear-gradient(135deg,#FF9F43,#ff6b35)">
            <span>Changer</span>
          </button>
        </div>
        <div class="msg" id="pw-msg"></div>
      </div>

      <!-- USER LIST -->
      <div class="users-card">
        <div class="users-header">
          <div class="section-title" style="margin:0">👥 Comptes clients <span id="user-count" style="color:var(--t3);font-size:13px;font-weight:400"></span></div>
          <div style="display:flex;gap:10px;align-items:center">
            <input class="search-input" type="text" id="search" placeholder="🔍 Filtrer..." oninput="filterUsers()">
            <button class="btn-refresh" onclick="loadUsers()">↻ Actualiser</button>
          </div>
        </div>
        <div id="user-list">
          <div class="empty-users">Chargement...</div>
        </div>
      </div>

    </main>
  </div>

  <div id="toast"></div>

  <script>
    var adminToken = sessionStorage.getItem('nyxia_admin_token') || ''
    var allUsers   = []

    /* ══════════════════════════════════
       LOGIN ADMIN
    ══════════════════════════════════ */
    function adminLogin() {
      var email    = document.getElementById('a-email').value.trim()
      var password = document.getElementById('a-password').value.trim()
      var btn      = document.getElementById('btn-admin-login')
      var spinner  = document.getElementById('login-spinner')
      var text     = document.getElementById('login-text')
      var msg      = document.getElementById('login-msg')

      if (!email || !password) { showMsg(msg, 'Remplis tous les champs.', 'error'); return }

      btn.disabled = true
      spinner.style.display = 'block'
      text.textContent = ''
      msg.style.display = 'none'

      fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          adminToken = data.token
          sessionStorage.setItem('nyxia_admin_token', adminToken)
          document.getElementById('login-page').style.display = 'none'
          document.getElementById('dashboard').style.display = 'block'
          loadUsers()
        } else {
          showMsg(msg, data.error || 'Accès refusé.', 'error')
          btn.disabled = false
          spinner.style.display = 'none'
          text.textContent = 'Accéder au dashboard'
        }
      })
      .catch(() => {
        showMsg(msg, 'Erreur de connexion.', 'error')
        btn.disabled = false
        spinner.style.display = 'none'
        text.textContent = 'Accéder au dashboard'
      })
    }

    function adminLogout() {
      sessionStorage.removeItem('nyxia_admin_token')
      location.reload()
    }

    /* ══════════════════════════════════
       CHARGER LES UTILISATEURS
    ══════════════════════════════════ */
    function loadUsers() {
      document.getElementById('user-list').innerHTML = '<div class="empty-users">Chargement...</div>'
      fetch('/api/admin/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: adminToken })
      })
      .then(r => r.json())
      .then(data => {
        if (!data.success) { toast('Erreur : ' + data.error); return }
        allUsers = data.users || []
        updateStats()
        renderUsers(allUsers)
      })
      .catch(() => toast('Erreur de chargement'))
    }

    function updateStats() {
      var active   = allUsers.filter(u => !u.disabled).length
      var disabled = allUsers.filter(u => u.disabled).length
      document.getElementById('stat-total').textContent    = allUsers.length
      document.getElementById('stat-active').textContent   = active
      document.getElementById('stat-disabled').textContent = disabled
    }

    function renderUsers(users) {
      var list = document.getElementById('user-list')
      document.getElementById('user-count').textContent = '(' + users.length + ')'

      if (!users.length) {
        list.innerHTML = '<div class="empty-users">Aucun compte client pour le moment</div>'
        return
      }

      list.innerHTML = users.map(function(u) {
        var statusHtml = u.disabled
          ? '<span class="user-status status-disabled">⏸ Désactivé</span>'
          : '<span class="user-status status-active">✓ Actif</span>'

        var toggleBtn = u.disabled
          ? '<button class="btn-sm btn-success" onclick="toggleUser(\'' + esc(u.email) + '\', false)">Activer</button>'
          : '<button class="btn-sm btn-warning" onclick="toggleUser(\'' + esc(u.email) + '\', true)">Désactiver</button>'

        return '<div class="user-row' + (u.disabled ? ' disabled-row' : '') + '">'
          + '<div class="user-email">📧 ' + esc(u.email) + '</div>'
          + statusHtml
          + '<div class="user-actions">'
          + toggleBtn
          + '<button class="btn-sm btn-danger" onclick="deleteUser(\'' + esc(u.email) + '\')">Supprimer</button>'
          + '</div>'
          + '</div>'
      }).join('')
    }

    function filterUsers() {
      var q = document.getElementById('search').value.toLowerCase()
      renderUsers(q ? allUsers.filter(u => u.email.includes(q)) : allUsers)
    }

    /* ══════════════════════════════════
       CRÉER UN UTILISATEUR
    ══════════════════════════════════ */
    function createUser() {
      var email    = document.getElementById('new-email').value.trim()
      var password = document.getElementById('new-password').value.trim()
      var btn      = document.getElementById('btn-create')
      var spinner  = document.getElementById('create-spinner')
      var text     = document.getElementById('create-text')
      var msg      = document.getElementById('create-msg')

      if (!email || !password) { showMsg(msg, 'Email et mot de passe requis.', 'error'); return }

      btn.disabled = true
      spinner.style.display = 'block'
      text.textContent = ''

      fetch('/api/admin/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: adminToken, email, password })
      })
      .then(r => r.json())
      .then(data => {
        btn.disabled = false
        spinner.style.display = 'none'
        text.textContent = 'Créer'
        if (data.success) {
          showMsg(msg, '✓ Compte créé : ' + email, 'success')
          document.getElementById('new-email').value    = ''
          document.getElementById('new-password').value = ''
          loadUsers()
        } else {
          showMsg(msg, data.error || 'Erreur.', 'error')
        }
      })
      .catch(() => {
        btn.disabled = false
        spinner.style.display = 'none'
        text.textContent = 'Créer'
        showMsg(msg, 'Erreur réseau.', 'error')
      })
    }

    /* ══════════════════════════════════
       DÉSACTIVER / ACTIVER
    ══════════════════════════════════ */
    function toggleUser(email, disable) {
      fetch('/api/admin/disable', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: adminToken, email, action: disable ? 'disable' : 'enable' })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) { toast(disable ? '⏸ Compte désactivé' : '✓ Compte activé'); loadUsers() }
        else toast('Erreur : ' + data.error)
      })
      .catch(() => toast('Erreur réseau'))
    }

    /* ══════════════════════════════════
       SUPPRIMER
    ══════════════════════════════════ */
    function deleteUser(email) {
      if (!confirm('Supprimer définitivement le compte ' + email + ' ?')) return
      fetch('/api/admin/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: adminToken, email })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) { toast('🗑 Compte supprimé'); loadUsers() }
        else toast('Erreur : ' + data.error)
      })
      .catch(() => toast('Erreur réseau'))
    }

    /* ══════════════════════════════════
       UTILS
    ══════════════════════════════════ */
    function showMsg(el, text, type) {
      el.textContent  = text
      el.className    = 'msg ' + type
      el.style.display = 'block'
      setTimeout(() => { el.style.display = 'none' }, 5000)
    }

    function toast(msg) {
      var t = document.getElementById('toast')
      t.textContent   = msg
      t.style.display = 'block'
      setTimeout(() => { t.style.display = 'none' }, 3500)
    }

    function esc(str) {
      return String(str || '').replace(/'/g, "\\'").replace(/</g,'&lt;').replace(/>/g,'&gt;')
    }

    /* ══════════════════════════════════
       AUTO-LOGIN si token existant
    ══════════════════════════════════ */
    if (adminToken) {
      fetch('/api/check-auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: adminToken })
      })
      .then(r => r.json())
      .then(data => {
        if (data.valid) {
          document.getElementById('login-page').style.display = 'none'
          document.getElementById('dashboard').style.display = 'block'
          loadUsers()
        } else {
          sessionStorage.removeItem('nyxia_admin_token')
          adminToken = ''
        }
      })
      .catch(() => {})
    }


    /* ══════════════════════════════════
       CHANGER MOT DE PASSE ADMIN
    ══════════════════════════════════ */
    function changePassword() {
      var newPw     = document.getElementById('new-pw').value.trim()
      var confirmPw = document.getElementById('confirm-pw').value.trim()
      var msg       = document.getElementById('pw-msg')

      if (!newPw || !confirmPw) { showMsg(msg, 'Remplis les deux champs.', 'error'); return }
      if (newPw.length < 6)     { showMsg(msg, 'Minimum 6 caractères.', 'error'); return }
      if (newPw !== confirmPw)  { showMsg(msg, 'Les mots de passe ne correspondent pas.', 'error'); return }

      fetch('/api/admin/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: adminToken, newPassword: newPw })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          showMsg(msg, '✓ Mot de passe changé avec succès !', 'success')
          document.getElementById('new-pw').value     = ''
          document.getElementById('confirm-pw').value = ''
        } else {
          showMsg(msg, data.error || 'Erreur.', 'error')
        }
      })
      .catch(() => showMsg(msg, 'Erreur réseau.', 'error'))
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && document.getElementById('login-page').style.display !== 'none') adminLogin()
    })
  </script>

</body>
