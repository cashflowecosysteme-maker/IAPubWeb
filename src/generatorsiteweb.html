  <script>
    /* ═══════════════════════════════════════
       ÉDITEUR INLINE — CORRIGÉ
    ═══════════════════════════════════════ */

    var editorOpen = false

    function toggleEditorPanel() {
      var panel = document.getElementById('editor-panel')
      var btn   = document.getElementById('btn-edit')
      if (!panel) return
      editorOpen = !editorOpen
      if (editorOpen) {
        panel.classList.add('open')
        btn.textContent = '✏️ Fermer éditeur'
        injectEditorListeners()
      } else {
        panel.classList.remove('open')
        btn.textContent = '✏️ Éditer'
      }
    }

    function toggleEditor() { toggleEditorPanel() }

    function injectEditorListeners() {
      var frame = document.getElementById('preview-frame')
      if (!frame || !frame.contentDocument) return
      try {
        var doc = frame.contentDocument
        var old = doc.getElementById('_nyxia_edit_script')
        if (old) old.remove()
        var s = doc.createElement('script')
        s.id = '_nyxia_edit_script'
        s.textContent =
          'var _sel=null;' +
          'document.body.addEventListener("mouseover",function(e){' +
          '  var t=e.target;' +
          '  if(t===document.body) return;' +
          '  if(_sel!==t){t.style.outline="1px dashed rgba(123,92,255,0.4)";}' +
          '},true);' +
          'document.body.addEventListener("mouseout",function(e){' +
          '  var t=e.target;' +
          '  if(t===document.body) return;' +
          '  if(_sel!==t){t.style.outline="";}' +
          '},true);' +
          'document.body.addEventListener("click",function(e){' +
          '  e.preventDefault();e.stopPropagation();' +
          '  if(_sel){_sel.style.outline="";_sel.removeAttribute("data-nyxia-sel");}' +
          '  _sel=e.target;' +
          '  if(_sel===document.body) return;' +
          '  _sel.style.outline="2px solid #7B5CFF";' +
          '  _sel.setAttribute("data-nyxia-sel","1");' +
          '  var isImg=(_sel.tagName==="IMG");' +
          '  var txt="";' +
          '  if(!isImg){' +
          '    if(_sel.children.length>0){txt=_sel.innerHTML}else{txt=(_sel.innerText||_sel.textContent||"").trim()}' +
          '  }' +
          '  var imgIdx=-1;if(isImg){var imgs=document.querySelectorAll("img");for(var i=0;i<imgs.length;i++){if(imgs[i]===_sel){imgIdx=i;break;}}}' +
          '  window.parent.postMessage({type:"nyxia_click",isImg:isImg,text:txt,html:txt,tag:_sel.tagName.toLowerCase(),src:isImg?_sel.src:"",imgIdx:imgIdx},"*");' +
          '},true);'
        doc.body.appendChild(s)
      } catch(e) { console.log('editor inject:', e) }
    }

    var _selectedImgIdx = -1

    window.addEventListener('message', function(e) {
      if (!e.data || e.data.type !== 'nyxia_click') return
      if (!e.data.isImg) {
        var sec   = document.getElementById('text-editor-section')
        var imgSec = document.getElementById('img-editor-section')
        var input = document.getElementById('selected-text-input')
        if (imgSec) imgSec.style.display = 'none'
        if (sec)   sec.style.display = 'block'
        if (input) { input.value = e.data.text; input.focus() }
      } else {
        _selectedImgIdx = e.data.imgIdx
        var sec   = document.getElementById('text-editor-section')
        var imgSec = document.getElementById('img-editor-section')
        if (sec)    sec.style.display = 'none'
        if (imgSec) imgSec.style.display = 'block'
        var prev = document.getElementById('img-editor-preview')
        if (prev) prev.src = e.data.src
        var grid = document.getElementById('img-pexels-grid')
        if (grid) grid.innerHTML = ''
      }
    })

    function applyTextEdit() {
      var input = document.querySelector('#text-editor-section textarea')
      var frame = document.getElementById('preview-frame')
      if (!input || !frame || !frame.contentDocument) return
      try {
        var doc = frame.contentDocument
        var sel = doc.querySelector('[data-nyxia-sel="1"]')
        if (!sel) {
          var all = doc.querySelectorAll('*')
          for (var i = all.length - 1; i >= 0; i--) {
            if (all[i].style.outline && all[i].style.outline.indexOf('2px solid') !== -1) { sel = all[i]; break }
          }
        }
        if (!sel) return
        var newVal = input.value
        if (sel.children.length > 0 && sel.innerHTML !== sel.textContent) {
          sel.innerHTML = newVal
        } else {
          sel.textContent = newVal
        }
        sel.style.outline = ''
        sel.removeAttribute('data-nyxia-sel')
        var btn = document.querySelector('[onclick="applyTextEdit()"]')
        if (btn) {
          var orig = btn.textContent
          btn.textContent = '✓ Appliqué !'
          btn.style.background = 'linear-gradient(135deg, #00C864, #00A050)'
          setTimeout(function() { btn.textContent = orig; btn.style.background = '' }, 1500)
        }
      } catch(e) {}
    }

    function applyColor(type, value) {
      var frame = document.getElementById('preview-frame')
      if (!frame || !frame.contentDocument) return
      try {
        var doc = frame.contentDocument
        switch(type) {
          case 'bg':
            doc.body.style.background = value
            doc.querySelectorAll('header,footer,nav,section,[class*="hero"],[class*="section"],[class*="container"],[class*="wrapper"],[class*="card"],[class*="box"]').forEach(function(el) {
              var c = getComputedStyle(el)
              if (c.backgroundColor !== 'rgba(0, 0, 0, 0)' && c.backgroundColor !== 'transparent') el.style.setProperty('background', value, 'important')
            })
            break
          case 'accent':
            doc.querySelectorAll('h1,h2,h3,h4,h5,h6,a,[class*="title"],[class*="heading"],[class*="accent"],[class*="highlight"],[class*="glow"],[class*="gradient"]').forEach(function(el) {
              el.style.setProperty('color', value, 'important')
            })
            break
          case 'text':
            doc.querySelectorAll('p,span,li,td,th,label,blockquote,figcaption,dd,dt,small,strong,em,b,i,div,section,article,[class*="text"],[class*="desc"],[class*="content"],[class*="info"],[class*="detail"]').forEach(function(el) {
              el.style.setProperty('color', value, 'important')
            })
            doc.body.style.setProperty('color', value, 'important')
            break
          case 'btn':
            doc.querySelectorAll('button,input[type="submit"],input[type="button"],a[class*="btn"],a[class*="button"],[class*="cta"],[role="button"]').forEach(function(el) {
              el.style.setProperty('background', value, 'important')
              el.style.setProperty('border-color', value, 'important')
            })
            break
        }
      } catch(e) {}
    }

    function saveEdits() {
      var frame = document.getElementById('preview-frame')
      if (!frame || !frame.contentDocument) return
      try {
        window.generatedCode = '<!DOCTYPE html>' + frame.contentDocument.documentElement.outerHTML
        var b = document.querySelector('[onclick="saveEdits()"]')
        if (b) { var o=b.textContent; b.textContent='✓ Sauvegardé!'; setTimeout(function(){b.textContent=o},2000) }
      } catch(e) {}
    }

    function copyEditedCode() {
      saveEdits()
      if (window.generatedCode) {
        navigator.clipboard.writeText(window.generatedCode).then(function() {
          var b = document.querySelector('[onclick="copyEditedCode()"]')
          if (b) { var o=b.textContent; b.textContent='✓ Copié!'; setTimeout(function(){b.textContent=o},2000) }
        })
      }
    }

    function resetEdits() {
      var frame = document.getElementById('preview-frame')
      if (frame && window.generatedCode) frame.srcdoc = window.generatedCode
    }

    function uploadEditorImage(input) {
      var file = input.files[0]; if (!file) return
      var reader = new FileReader()
      reader.onload = function(ev) { replaceEditorImage(ev.target.result) }
      reader.readAsDataURL(file); input.value = ''
    }

    function replaceEditorImage(newSrc) {
      if (_selectedImgIdx < 0) { alert('Clique d\'abord sur une image dans le preview'); return }
      var frame = document.getElementById('preview-frame')
      if (!frame || !frame.contentDocument) return
      try {
        var imgs = frame.contentDocument.querySelectorAll('img')
        if (imgs[_selectedImgIdx]) {
          imgs[_selectedImgIdx].src = newSrc
          imgs[_selectedImgIdx].style.outline = ''
          imgs[_selectedImgIdx].removeAttribute('data-nyxia-sel')
          document.getElementById('img-editor-preview').src = newSrc
          saveEdits()
        }
      } catch(e) {}
    }

    function searchEditorPexels() {
      var query = document.getElementById('img-pexels-query').value.trim(); if (!query) return
      var grid = document.getElementById('img-pexels-grid')
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--t4);font-size:11px;padding:8px">Recherche...</div>'
      var promises = []
      for (var i = 0; i < 4; i++) {
        promises.push(fetch('/api/image', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({prompt:query}) }).then(function(r){return r.json()}).catch(function(){return null}))
      }
      Promise.all(promises).then(function(results) {
        window._pexelsEditorImgs = results.filter(function(d){return d && d.success && d.dataUrl})
        if (!window._pexelsEditorImgs.length) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--t4);font-size:11px;padding:8px">Aucun résultat</div>'; return }
        grid.innerHTML = window._pexelsEditorImgs.map(function(d, i) {
          return '<img src="'+d.dataUrl+'" onclick="replaceEditorImage(window._pexelsEditorImgs['+i+'].dataUrl)" style="width:100%;height:55px;object-fit:cover;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:all .2s" onmouseover="this.style.borderColor=\'#7B5CFF\'" onmouseout="this.style.borderColor=\'transparent\'">'
        }).join('')
      })
    }

    var _publishedUrl = ''

    function openPublishModal() {
      var modal = document.getElementById('publish-modal'); if (!modal) return
      var input = document.getElementById('user-input')
      var defaultName = 'mon-site-nyxia'
      if (input && input.value) { defaultName = input.value.toLowerCase().replace(/[^a-z0-9\s-]/g,'').trim().split(/\s+/).slice(0,4).join('-').substring(0,40) || 'mon-site-nyxia' }
      document.getElementById('publish-name').value = defaultName
      updatePublishPreview(); showPublishState('form'); modal.style.display = 'flex'
    }

    function closePublishModal() { var m = document.getElementById('publish-modal'); if (m) m.style.display = 'none' }

    function updatePublishPreview() {
      var name = document.getElementById('publish-name').value.toLowerCase().replace(/[^a-z0-9-]/g,'-').replace(/--+/g,'-').replace(/^-|-$/g,'')
      var p = document.getElementById('publish-preview-url'); if (p) p.textContent = name ? '→ ' + name + '.pages.dev' : ''
    }

    function showPublishState(state) {
      ['form','loading','success','error'].forEach(function(s) { var el = document.getElementById('publish-'+s+'-state'); if (el) el.style.display = s===state ? 'block' : 'none' })
    }

    function copyPublishUrl() {
      if (_publishedUrl) { navigator.clipboard.writeText(_publishedUrl).then(function() { var b = document.getElementById('btn-copy-publish-url'); if (b) { b.textContent='✓ Copié !'; setTimeout(function(){b.textContent='📋 Copier le lien'},2000) } }) }
    }

    function doPublish() {
      var rawName = document.getElementById('publish-name').value.trim()
      if (!rawName) { document.getElementById('publish-name').style.borderColor = 'rgba(255,75,110,0.6)'; return }
      var cleanName = rawName.toLowerCase().replace(/[^a-z0-9-]/g,'-').replace(/--+/g,'-').replace(/^-|-$/g,'').substring(0,50)
      var html = window.generatedCode || ''
      if (!html) { try { var frame = document.getElementById('preview-frame'); if (frame && frame.contentDocument) html = '<!DOCTYPE html>' + frame.contentDocument.documentElement.outerHTML } catch(e){} }
      if (!html || html.length < 100) { showPublishState('error'); document.getElementById('publish-error-msg').textContent = "Aucun site généré. Génère d'abord un site."; return }
      showPublishState('loading')
      fetch('/api/publish', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({projectName:cleanName, html:html}) })
      .then(function(r){return r.json()})
      .then(function(data) {
        if (data.success && data.url) { _publishedUrl = data.url; var u = document.getElementById('publish-result-url'); if (u) { u.textContent=data.url; u.href=data.url } showPublishState('success') }
        else { showPublishState('error'); document.getElementById('publish-error-msg').textContent = data.error || 'Erreur inconnue.' }
      })
      .catch(function(e) { showPublishState('error'); document.getElementById('publish-error-msg').textContent = 'Erreur réseau : ' + e.message })
    }

    document.addEventListener('click', function(e) { var m = document.getElementById('publish-modal'); if (m && m.style.display==='flex' && e.target===m) closePublishModal() })

    function toggleNiches() {
      var grid = document.getElementById('niches-grid'); var arrow = document.getElementById('niche-arrow')
      var open = grid.style.display !== 'none' && grid.style.display !== ''
      grid.style.display = open ? 'none' : 'grid'
      if (arrow) arrow.style.transform = open ? 'rotate(0deg)' : 'rotate(180deg)'
    }

    var _nichePrompts = {
      'spa': { mode:'image', prompt:'Spa luxueux et centre de bien-être haut de gamme...', image:'https://picsum.photos/seed/spa-luxe/1400/800' },
      'naturopathe': { mode:'image', prompt:'Naturopathe et thérapeute en médecine naturelle...', image:'https://picsum.photos/seed/nature-plantes/1400/800' },
      'coach': { mode:'image', prompt:'Coach de vie et business certifié ICF...', image:'https://picsum.photos/seed/coaching-success/1400/800' },
      'restaurant': { mode:'image', prompt:'Restaurant gastronomique...', image:'https://picsum.photos/seed/gastronomie-chef/1400/800' }
    }

    function applyNiche(nicheKey) {
      var niche = _nichePrompts[nicheKey]; if (!niche) return
      switchMode('image')
      var input = document.getElementById('user-input'); if (input) { input.value = niche.prompt; input.focus() }
      var grid = document.getElementById('niches-grid'); if (grid) grid.style.display = 'none'
    }

    function switchMode(mode) {
      var tabImg = document.getElementById('tab-image'), tabUrl = document.getElementById('tab-url')
      var imgMode = document.getElementById('image-mode'), urlMode = document.getElementById('url-mode')
      if (!tabImg) return
      if (mode === 'url') {
        tabUrl.style.background='linear-gradient(135deg,rgba(123,92,255,0.2),rgba(90,108,255,0.2))'; tabUrl.style.borderColor='rgba(123,92,255,0.4)'; tabUrl.style.color='#fff'
        tabImg.style.background='rgba(123,92,255,0.05)'; tabImg.style.borderColor='rgba(123,92,255,0.15)'; tabImg.style.color='#8891B8'
        imgMode.style.display='none'; urlMode.style.display='flex'
      } else {
        tabImg.style.background='linear-gradient(135deg,rgba(123,92,255,0.2),rgba(90,108,255,0.2))'; tabImg.style.borderColor='rgba(123,92,255,0.4)'; tabImg.style.color='#fff'
        tabUrl.style.background='rgba(123,92,255,0.05)'; tabUrl.style.borderColor='rgba(123,92,255,0.15)'; tabUrl.style.color='#8891B8'
        imgMode.style.display='flex'; urlMode.style.display='none'
      }
      window._currentMode = mode
    }
  </script>
