<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NyXia IA — Votre Empire d'Affiliation</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg1: #0F1C3F; --p: #7B5CFF; --t2: #D6D9F0; --t3: #8891B8; --r: 14px; }
        body { background: var(--bg1); color: var(--t2); font-family: 'Outfit', sans-serif; margin: 0; overflow-x: hidden; }
        .h1-glow { background: linear-gradient(135deg, #a78bfa, #4FA3FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 20px rgba(123,92,255,0.5)); }
        .pillar-card { background: rgba(26,37,84,0.5); border: 1px solid rgba(123,92,255,0.12); border-radius: var(--r); padding: 24px; backdrop-filter: blur(10px); }
        #generate-btn { width: 100%; padding: 20px; border-radius: 50px; cursor: pointer; font-family: 'Space Grotesk', sans-serif; font-size: 17px; font-weight: 700; background: var(--p); color: #fff; border: none; box-shadow: 0 4px 20px rgba(123,92,255,0.4); text-transform: uppercase; }
        .input-main { width: 100%; padding: 16px 20px; border-radius: var(--r); background: rgba(10,18,40,0.8); border: 1px solid rgba(123,92,255,0.15); color: #fff; margin-bottom: 10px; }
        #upload-preview { display: none; margin: 15px 0; border-radius: var(--r); overflow: hidden; border: 1px solid var(--p); }
        #upload-preview img { width: 100%; display: block; }
    </style>
</head>
<body>
    <canvas id="starry-canvas" style="position:fixed;inset:0;z-index:0;pointer-events:none"></canvas>
    <main style="position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px">
        <div style="max-width:720px;width:100%;text-align:center;display:flex;flex-direction:column;gap:30px">
            <h1 class="h1-glow" style="font-family:'Space Grotesk',sans-serif;font-size:3.5rem;margin:0;">NyXia IA</h1>
            <h2 style="font-size:1.8rem;">Votre Empire d'Affiliation prêt en <span style="color:var(--p)">60 secondes</span></h2>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;text-align:left">
                <div class="pillar-card"><p style="color:var(--p);font-weight:700">Visibilité Permanente</p></div>
                <div class="pillar-card"><p style="color:var(--p);font-weight:700">Conversion Optimisée</p></div>
                <div class="pillar-card"><p style="color:var(--p);font-weight:700">CashFlow Automatique</p></div>
            </div>
            <input id="user-input" class="input-main" type="text" placeholder="Décrivez votre projet d'affiliation...">
            <button onclick="document.getElementById('file-input').click()" style="padding:15px;background:none;border:1px solid var(--p);color:var(--t2);border-radius:var(--r);cursor:pointer">📷 Ajouter une Image</button>
            <input type="file" id="file-input" accept="image/*" style="display:none" onchange="previewImage(this)">
            <div id="upload-preview"><img id="preview-thumb" src=""></div>
            <button id="generate-btn">Générer mon Empire</button>
        </div>
    </main>
    <script src="/js/starry-bg.js" defer></script>
    <script>
        let base64Image = "";
        function previewImage(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                base64Image = e.target.result;
                document.getElementById('preview-thumb').src = e.target.result;
                document.getElementById('upload-preview').style.display = "block";
            };
            reader.readAsDataURL(input.files[0]);
        }
        document.getElementById('generate-btn').addEventListener('click', async () => {
            const btn = document.getElementById('generate-btn');
            if (!base64Image) return alert("Oznya, il faut une image !");
            btn.innerText = "NyXia Alchimise...";
            try {
                const response = await fetch('/api/vision', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image_base64: base64Image, prompt: document.getElementById('user-input').value })
                });
                const data = await response.json();
                alert("Empire généré ! (Voir la console)");
            } catch (err) { alert("Erreur : Le cerveau ne répond pas."); }
            btn.innerText = "Générer mon Empire";
        });
    </script>
</body>
</html>
