<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NyXia IA — Votre Empire</title>
    <style>
        body { background: #0B1F3A; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        canvas { position: fixed; inset: 0; z-index: -1; }
        .box { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px); text-align: center; border: 1px solid rgba(123,92,255,0.3); }
        h1 { font-size: 3rem; margin: 0; color: #a78bfa; }
        button { background: #7B5CFF; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .nyxia { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; border: 2px solid #7B5CFF; cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="box">
        <h1>NyXia IA</h1>
        <p>Votre Empire manifesté en quelques minutes</p>
        <input type="text" placeholder="Votre vision..." style="width:100%; padding:10px; border-radius:5px; border:none; margin-top:10px;">
        <br>
        <button onclick="alert('Alchimie en cours...')">Activer l'Alchimie</button>
    </div>
    <img src="/NyXia.png" class="nyxia" onclick="alert('NyXia est prête.')" onerror="this.style.display='none'">

    <script>
        const c = document.getElementById('canvas');
        const x = c.getContext('2d');
        let w, h, s = [];
        function init() { 
            w = c.width = window.innerWidth; h = c.height = window.innerHeight; 
            s = Array.from({length:200}, () => ({x:Math.random()*w, y:Math.random()*h, r:Math.random()*2, a:Math.random()}));
        }
        function draw() {
            x.fillStyle = '#0B1F3A'; x.fillRect(0,0,w,h);
            s.forEach(p => {
                p.a += 0.01; if(p.a > 1) p.a = 0;
                x.fillStyle = `rgba(255,255,255,${p.a})`;
                x.beginPath(); x.arc(p.x, p.y, p.r, 0, Math.PI*2); x.fill();
            });
            requestAnimationFrame(draw);
        }
        window.onresize = init; init(); draw();
    </script>
</body>
</html>
