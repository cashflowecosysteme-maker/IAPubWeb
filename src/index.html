<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NyXia IA — Votre Empire d'Affiliation</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg1: #0F1C3F; /* Ton bleu d'origine */
      --bg2: #1A2554;
      --p: #7B5CFF;
      --gold: #D4AF37;
      --t2: #D6D9F0;
      --t3: #8891B8;
      --r: 14px;
    }

    /* Reset & Base */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg1); color: var(--t2); font-family: 'Outfit', sans-serif; overflow-x: hidden; }

    /* Titre Glow d'origine */
    .h1-glow {
      background: linear-gradient(135deg, #a78bfa, #4FA3FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 20px rgba(123,92,255,0.5));
    }

    /* Tes 3 Piliers intacts */
    .pillar-card {
      background: rgba(26,37,84,0.5);
      border: 1px solid rgba(123,92,255,0.12);
      border-radius: var(--r);
      padding: 24px;
      backdrop-filter: blur(10px);
      transition: all .3s;
    }

    /* LE BOUTON : NUIT & OR (Enfin intégré sans rien casser) */
    #generate-btn {
      display: block;
      width: 100%;
      margin-top: 15px;
      padding: 20px;
      border-radius: var(--r);
      cursor: pointer;
      text-align: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 17px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      
      /* Style Vitreux Nuit */
      background: rgba(5, 10, 31, 0.6);
      color: var(--gold);
      border: 1px solid rgba(212, 175, 55, 0.4);
      backdrop-filter: blur(15px);
      
      transition: all 0.4s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    #generate-btn:hover {
      border-color: var(--gold);
      background: rgba(212, 175, 55, 0.1);
      color: #FFF;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
      transform: translateY(-2px);
    }

    /* Style Inputs */
    .input-main {
      width: 100%;
      padding: 16px 20px;
      border-radius: var(--r);
      background: rgba(10,18,40,0.8);
      border: 1px solid rgba(123,92,255,0.15);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      outline: none;
    }

    /* Widget NyXia Toggle (Avatar) */
    #nyxia-toggle {
      position: fixed; bottom: 24px; right: 24px;
      width: 60px; height: 60px; border-radius: 50%;
      border: 2px solid rgba(123,92,255,0.5);
      background: rgba(15,28,63,0.9);
      cursor: pointer; z-index: 999;
      display: flex; align-items: center; justify-content: center;
    }
    #nyxia-toggle img { width: 42px; height: 42px; border-radius: 50%; }
  </style>
</head>
<body>

  <canvas id="starry-canvas" style="position:fixed;inset:0;z-index:0;pointer-events:none"></canvas>

  <main style="position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px">
    <div style="max-width:720px;width:100%;text-align:center;display:flex;flex-direction:column;gap:35px">
      
      <h1 class="h1-glow" style="font-family:'Space Grotesk',sans-serif;font-size:3.5rem;font-weight:700;">NyXia IA</h1>
      
      <h2 style="color:var(--t2);font-weight:600;font-size:1.8rem">Votre site d'affiliation prêt en <span style="color:var(--p)">60 secondes</span></h2>

      <p style="color:var(--t3);max-width:560px;margin:0 auto;line-height:1.7">
        NyXia travaille pour vous <span style="color:var(--p);font-weight:600">24h/24, 7j/7</span>.
      </p>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;text-align:left">
        <div class="pillar-card">
          <p style="color:var(--p);font-weight:700;margin-bottom:8px">Visibilité Google</p>
          <p style="color:var(--t3);font-size:0.85rem">Trouvé par des milliers de personnes.</p>
        </div>
        <div class="pillar-card">
          <p style="color:var(--p);font-weight:700;margin-bottom:8px">Mots qui vendent</p>
          <p style="color:var(--t3);font-size:0.85rem">Conçu pour transformer vos visiteurs.</p>
        </div>
        <div class="pillar-card">
          <p style="color:var(--p);font-weight:700;margin-bottom:8px">Commissions Auto</p>
          <p style="color:var(--t3);font-size:0.85rem">Gagnez des revenus grâce à l'IA.</p>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:15px">
        <input id="user-input" class="input-main" type="text" placeholder="Décrivez votre projet...">
        
        <button onclick="document.getElementById('file-input').click()" style="padding:15px; border-radius:var(--r); border:1px solid rgba(123,92,255,0.3); background:rgba(123,92,255,0.05); color:var(--t2); cursor:pointer">📷 Ajouter une Image</button>
        <input type="file" id="file-input" accept="image/*" style="display:none" onchange="previewImage(this)">

        <div id="upload-preview" style="display:none; border-radius:var(--r); overflow:hidden; border:1px solid var(--gold)">
            <img id="preview-thumb" src="" style="width:100%; display:block">
        </div>

        <button id="generate-btn">
          Générer mon Empire
        </button>
      </div>

    </div>
  </main>

  <div id="nyxia-toggle"><img src="/NyXia.png" alt="NyXia"></div>

  <script>
    // Preview image
    function previewImage(input) {
      const file = input.files[0];
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('preview-thumb').src = e.target.result;
        document.getElementById('upload-preview').style.display = "block";
      };
      reader.readAsDataURL(file);
    }
  </script>

</body>
</html>
