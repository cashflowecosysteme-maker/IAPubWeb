<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NyXia IA — Votre Empire d'Affiliation</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Space+Grotesk:wght@500;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg1: #050505; /* Noir Profond */
      --gold: #D4AF37;
      --gold-glow: rgba(212, 175, 55, 0.3);
      --nuit: rgba(10, 20, 50, 0.2); /* Bleu Marine Vitreux */
      --t2: #D6D9F0;
    }

    body { 
      background: var(--bg1); 
      color: var(--t2); 
      font-family: 'Outfit', sans-serif; 
      margin: 0; 
      overflow-x: hidden;
    }

    .hero-glow {
      position: absolute;
      top: 0; right: 0;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Le Bouton Alchimique : Nuit & Or */
    .btn-oznya {
      position: relative;
      padding: 20px 40px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 17px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--gold);
      background: var(--nuit);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 12px;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.4s ease;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      width: 100%;
    }

    .btn-oznya:hover {
      border-color: var(--gold);
      box-shadow: 0 0 40px var(--gold-glow);
      transform: translateY(-2px);
      color: #fff;
    }

    /* Reflet vitreux au survol */
    .btn-oznya::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.6s ease;
    }

    .btn-oznya:hover::after {
      left: 100%;
    }

    .input-field {
      width: 100%;
      padding: 18px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(123,92,255,0.1);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      outline: none;
      transition: all 0.3s;
    }

    .input-field:focus {
      border-color: var(--gold);
      background: rgba(255,255,255,0.06);
    }
  </style>
</head>
<body>

  <div class="hero-glow"></div>

  <main style="max-width: 800px; margin: 100px auto; padding: 20px; text-align: center;">
    
    <h1 style="font-family: 'Cinzel', serif; font-size: 4rem; color: var(--gold); margin-bottom: 10px;">NYXIA IA</h1>
    <p style="font-size: 1.2rem; opacity: 0.8; margin-bottom: 50px;">Architecte de votre Empire d'Affiliation</p>

    <div style="background: rgba(255,255,255,0.02); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(20px);">
      
      <div style="margin-bottom: 20px;">
        <input type="text" id="user-input" class="input-field" placeholder="Décrivez votre vision (ex: Un rituel de Beltane)...">
      </div>

      <div style="display: flex; gap: 15px; margin-bottom: 25px;">
        <button onclick="document.getElementById('file-input').click()" style="background: none; border: 1px solid var(--gold); color: var(--gold); padding: 15px; border-radius: 12px; cursor: pointer; flex: 1;">
          📷 Ajouter une Image
        </button>
        <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleImage(this)">
      </div>

      <div id="upload-preview" style="display:none; margin-bottom: 20px;">
        <img id="preview-thumb" src="" style="width: 100%; border-radius: 12px; border: 1px solid var(--gold);">
      </div>

      <button id="generate-btn" class="btn-oznya">
        Générer mon Empire
      </button>

    </div>

    <p style="margin-top: 40px; font-size: 0.8rem; opacity: 0.4;">
      Propulsé par Publication-Web — Visionnaire depuis 1997
    </p>
  </main>

  <script>
    let base64Image = "";

    function handleImage(input) {
      const file = input.files[0];
      const reader = new FileReader();
      reader.onload = (e) => {
        base64Image = e.target.result;
        document.getElementById('preview-thumb').src = base64Image;
        document.getElementById('upload-preview').style.display = "block";
      };
      reader.readAsDataURL(file);
    }

    document.getElementById('generate-btn').addEventListener('click', async () => {
      const btn = document.getElementById('generate-btn');
      btn.innerText = "NyXia Alchimise...";
      
      try {
        const response = await fetch('/api/vision', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image_base64: base64Image })
        });
        
        const data = await response.json();
        // Ici, tu peux rediriger vers une page de preview ou afficher le code
        console.log(data);
        alert("Empire Généré ! Vérifie la console.");
        btn.innerText = "Générer mon Empire";
      } catch (err) {
        alert("Erreur de connexion avec l'Empire.");
        btn.innerText = "Générer mon Empire";
      }
    });
  </script>

</body>
</html>
