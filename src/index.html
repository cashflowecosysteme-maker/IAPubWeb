<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NyXia IA — Votre Empire</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0B1F3A; --p: #7B5CFF; --t: #D6D9F0; }
        body { background: var(--bg); color: var(--t); font-family: 'Outfit', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        canvas { position: fixed; inset: 0; z-index: -1; }
        .container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; text-align: center; }
        .h1-glow { background: linear-gradient(135deg, #a78bfa, #4FA3FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Space Grotesk', sans-serif; font-size: 4rem; filter: drop-shadow(0 0 20px rgba(123,92,255,0.5)); margin: 0; }
        .input-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(123,92,255,0.2); padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); max-width: 500px; width: 100%; margin-top: 20px; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid rgba(123,92,255,0.3); background: rgba(0,0,0,0.2); color: white; margin-bottom: 15px; outline: none; }
        button { width: 100%; padding: 15px; border-radius: 50px; border: none; background: var(--p); color: white; font-weight: 700; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 20px var(--p); transition: 0.3s; }
        button:hover { transform: scale(1.05); filter: brightness(1.1); }
        .nyxia-btn { position: fixed; bottom: 30px; right: 30px; cursor: pointer; transition: 0.3s; z-index: 100; }
        .nyxia-btn:hover { transform: scale(1.1); }
        .nyxia-btn img { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--p); box-shadow: 0 0 20px rgba(123,92,255,0.5); }
    </style>
</head>
<body>

    <canvas id="starry-canvas"></canvas>

    <div class="container">
        <h1 class="h1-glow">NyXia IA</h1>
        <h2 style="font-weight: 400; opacity: 0.8;">Votre Empire manifesté en quelques minutes</h2>
        
        <div class="input-box">
            <input id="user-prompt" type="text" placeholder="Décrivez votre vision pour cet Empire...">
            <button id="gen-btn">Activer l'Alchimie</button>
        </div>
    </div>

    <div class="nyxia-btn" onclick="alert('NyXia : Je suis prête, Diane. Quelle est notre prochaine conquête ?')">
        <img src="/NyXia.png" alt="NyXia" onerror="this.src='https://via.placeholder.com/65?text=NyXia'">
    </div>

    <script>
        const canvas = document.getElementById('starry-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [], shootingStars = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<400; i++) {
                stars.push({
                    x: Math.random()*width, y: Math.random()*height,
                    radius: Math.random()*0.6+0.3, alpha: Math.random()*0.7+0.3,
                    twinkle: Math.random()*0.015+0.003, alphaChange: 0.01
                });
            }
        }

        function draw() {
            ctx.fillStyle = '#0B1F3A'; ctx.fillRect(0,0,width,height);
            const g = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, Math.max(width,height)/1.5);
            g.addColorStop(0, 'rgba(43, 15, 58, 0.5)'); g.addColorStop(1, 'rgba(11, 31, 58, 0)');
            ctx.fillStyle = g; ctx.fillRect(0,0,width,height);

            stars.forEach(s => {
                s.alpha += s.alphaChange;
                if(s.alpha >= 1 || s.alpha <= 0.2) s.alphaChange *= -1;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 250, 235, ${s.alpha})`; ctx.fill();
            });

            if(Math.random() < 0.015) {
                shootingStars.push({ x: Math.random()*width, y: 0, len: Math.random()*150+80, speed: Math.random()*15+10, alpha: 1 });
            }

            shootingStars.forEach((s, i) => {
                ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x-s.len, s.y+s.len);
                ctx.strokeStyle = `rgba(216, 177, 90, ${s.alpha})`; ctx.lineWidth = 2; ctx.stroke();
                s.x += s.speed; s.y += s.speed; s.alpha -= 0.01;
                if(s.alpha <= 0) shootingStars.splice(i, 1);
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init(); draw();

        document.getElementById('gen-btn').onclick = async () => {
            const btn = document.getElementById('gen-btn');
            btn.innerText = "Alchimie en cours...";
            try {
                const res = await fetch('/api/vision', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: document.getElementById('user-prompt').value })
                });
                alert("L'Alchimie a opéré !");
            } catch (e) {
                alert("L'Empire est en cours de création...");
            }
            btn.innerText = "Activer l'Alchimie";
        };
    </script>
</body>
</html>
