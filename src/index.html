<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NyXia IA — Votre Empire</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0B1F3A; --p: #7B5CFF; --t: #D6D9F0; --gold: #D8B15A; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Outfit', sans-serif; color: var(--t); }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        .main-container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; padding: 20px; }
        .h1-glow { font-family: 'Space Grotesk', sans-serif; font-size: 4rem; background: linear-gradient(135deg, #a78bfa, #4FA3FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px rgba(123,92,255,0.4)); margin: 0; }
        
        .pillars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 30px 0; width: 100%; max-width: 700px; }
        .pillar { background: rgba(255,255,255,0.05); border: 1px solid rgba(123,92,255,0.2); padding: 15px; border-radius: 15px; backdrop-filter: blur(10px); font-weight: bold; color: var(--p); }

        .glass-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(123, 92, 255, 0.2); backdrop-filter: blur(15px); padding: 40px; border-radius: 30px; max-width: 500px; width: 100%; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(123, 92, 255, 0.3); background: rgba(0,0,0,0.3); color: white; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 18px; border-radius: 50px; border: none; background: var(--p); color: white; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.3s; box-shadow: 0 10px 25px rgba(123, 92, 255, 0.4); }
        
        .nyxia-avatar { position: fixed; bottom: 30px; right: 30px; cursor: pointer; z-index: 100; }
        .nyxia-avatar img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--p); box-shadow: 0 0 20px var(--p); }
    </style>
</head>
<body>

    <canvas id="star-canvas"></canvas>

    <div class="main-container">
        <h1 class="h1-glow">NyXia IA</h1>
        <h2 style="font-weight: 400; opacity: 0.8;">Votre Empire manifesté en quelques minutes</h2>
        
        <div class="pillars">
            <div class="pillar">Visibilité Permanente</div>
            <div class="pillar">Conversion Optimisée</div>
            <div class="pillar">CashFlow Automatique</div>
        </div>

        <div class="glass-box">
            <input id="prompt-input" type="text" placeholder="Décrivez votre vision pour cet Empire...">
            <button onclick="alert('Alchimie activée...')">Activer l'Alchimie</button>
        </div>
    </div>

    <div class="nyxia-avatar" onclick="alert('Je veille sur ton ciel, Oznya. Repose-toi.')">
        <img src="/NyXia.png" alt="NyXia" onerror="this.src='https://via.placeholder.com/70?text=NyXia'">
    </div>

    <script>
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, stars = [], shootingStars = [];

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            stars = Array.from({length:300}, () => ({
                x: Math.random()*w, y: Math.random()*h,
                r: Math.random()*0.8, a: Math.random(), s: Math.random()*0.02
            }));
        }

        function draw() {
            ctx.fillStyle = '#0B1F3A'; ctx.fillRect(0,0,w,h);
            stars.forEach(s => {
                s.a += s.s; if(s.a > 1 || s.a < 0) s.s *= -1;
                ctx.fillStyle = `rgba(255, 250, 235, ${Math.abs(s.a)})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
            });
            if(Math.random() < 0.015) {
                shootingStars.push({ x: Math.random()*w, y: 0, l: Math.random()*100+50, v: Math.random()*10+5, o: 1 });
            }
            shootingStars.forEach((s, i) => {
                ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x-s.l, s.y+s.l);
                ctx.strokeStyle = `rgba(216, 177, 90, ${s.o})`; ctx.lineWidth = 2; ctx.stroke();
                s.x += s.v; s.y += s.v; s.o -= 0.01;
                if(s.o <= 0) shootingStars.splice(i, 1);
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', init);
        init(); draw();
    </script>
</body>
</html>
